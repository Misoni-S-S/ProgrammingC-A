<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>ピクロス課題</title>

        <style>
            .start_page{
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: #95c8ff;
                z-index: 9999;

                display: flex;
                justify-content: center;
                align-items: center;
                color: white;
                text-align: center;

                opacity: 1;
                transition: opacity 0.5s ease;}

            .start_image{
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                z-index: -1;
                opacity: 0.3;
            }

            .start_title{
                background-color: rgba(255, 255, 255, 0.6);
                color: #2c3e50;
                font-weight: bold;
                font-size: 20px;
                padding: 12px 35px;
                border: 2px solid #2c3e50;
                border-radius: 12px;
                box-shadow: 0 5px 0 #2c3e50;
                cursor: pointer;
                margin-top: 20px;
            }

            .start_button{
                background-color: #f6af6d;
                color: white;
                font-weight: bold;
                border: none;
                border-radius: 25px;
                padding: 12px 35px;
                font-size: 20px;
                box-shadow: 0 4px 0 #d35400;
                cursor: pointer;
            }

            .setting_title{
                position: fixed;
                top:0;
                left: 0;
                width: 100vw;
                height: 60px;
                padding:0;
                margin:0;
                background-color: #f0f0f0;
                color: rgb(0, 0, 0);
                z-index: 100;
                box-shadow: 0 4px 0 #434343;
            }

            .setting_item {
                width: 100vw;
                height: 100vh;
                padding-top: 60px;
                box-sizing: border-box;

                display: flex;
                justify-content: center;
                align-items: center;

                position: relative;
                perspective: 1000px;
                transform-style: preserve-3d;
            }

            .setting_front_item, .setting_back_item {
                width: min(80vw, 90vh);
                height: min(90vw, 80vh);

                background: #f0f0f0;
                border: 2px solid #2c3e50;
                border-radius: 25px;

                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
                position: absolute;
                flex-direction:column;

                font-size: min(3.5vw, 16px);
                word-break: break-all;

                backface-visibility: hidden;
                transition: transform 0.6s;
            }

            .setting_front_item {
                transform: rotateY(0deg) translateZ(1px);
            }

            .setting_back_item {
                transform: rotateY(180deg) translateZ(1px);
            }

            .setting_item.is-flipped .setting_front_item {
                transform: rotateY(180deg) translateZ(1px);
                visibility: hidden
            }

            .setting_item.is-flipped .setting_back_item {
                transform: rotateY(360deg) translateZ(1px);
                visibility: visible
            }

            /* .setting_back_item > * {
                display: inline-block;
                transform: rotateY(180deg);
            } ここが悪さしてた. 180度裏返ししてた*/
        </style>
    </head>
    <body>
        <!-- --------------------- -->
        <!-- 開始画面 -->
        <!-- --------------------- -->

        <script>
            //----------------------------
            // スタートページ
            //----------------------------
            function deleteStartScreen() {
                const startPage = document.getElementById('start_page');
                if (startPage) {
                    startPage.style.opacity = '0';

                    setTimeout(() => {
                        startPage.remove();
                    }, 500);
                }
            }

            // // デバック用の自動実行
            // window.onload = function() {
            //     deleteStartScreen();
            // };



            //----------------------------
            // 設定画面
            //----------------------------
            function flip_setting_item(e) {
                if (!(e instanceof Event)) {
                    console.log("Event から呼び出されていない");
                    return ;
                }

                const clickedElement = e.target;
                const item = clickedElement.closest(".setting_item");

                if (item) {
                    item.classList.toggle("is-flipped");
                    console.log("ひっくり返し成功");
                }else {
                    console.error(".setting_item が見つかりません");
                }
            }
        </script>

        <div
            id = "start_page"
            class = "start_page"
        >
            <img
                src="./image/title.png"
                alt="No Image"
                class="start_image"
            >
            <div>
                <h1 class="start_title">
                    ピクロス
                </h1>
                <button
                    onclick="deleteStartScreen()"
                    class="start_button"
                >
                    スタート！
                </button>
            </div>
        </div>

        <!-- ------------------------- -->
        <!-- 設定画面 -->
        <!-- ------------------------- -->

        <!-- メニュー -->
        <h1 class="setting_title">ピクロス</h1>

        <!-- 具体的な設定 -->
        <div class="setting_item">
            <div class="setting_front_item">
                <label for = "sizeInput">
                    盤面の大きさ：
                </label>
                <select id="sizeInput">
                    <option value="3">3x3</option>
                    <option value="5">5x5</option>
                    <option value="10">10x10</option>
                </select>
                <label for = "idInput">
                    問題番号：
                </label>
                <select id = "idInput">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
                <p></p>
                <button
                    onclick="flip_setting_item(event); startGame();"
                >
                    スタート！
                </buttom>
            </div>

            <div class = "setting_back_item">
                <table id="stage"></table>
            </div>
        </div>

        <script src="main.js"></script>

    </body>
</html>
